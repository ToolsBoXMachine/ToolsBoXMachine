<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Boost your productivity with our elegant online Pomodoro timer and focus tracker."
    />
    <meta
      name="keywords"
      content="pomodoro timer, focus timer, productivity tool, 25 minute timer, online stopwatch, study timer, time management, custom timer, tbxm, toolsboxmachine, tbxm website, tbxm drayko, toolsboxmachine drayko, drayko tools, drayko"
    />
    <title>Pomodoro Timer (TBXM)</title>

    <link rel="icon" href="../../.assets/logo/fav.png" />
    <link rel="stylesheet" href="../../style.css" />

    <style>
      .timer-layout {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 500px;
        margin-top: 1rem;
      }

      .timer-container {
        position: relative;
        width: 340px;
        height: 340px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(15, 23, 42, 0.4);
        border-radius: 50%;
        box-shadow:
          0 20px 50px rgba(0, 0, 0, 0.3),
          inset 0 0 40px rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .timer-svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }

      .timer-circle-bg {
        fill: none;
        stroke: rgba(255, 255, 255, 0.05);
        stroke-width: 8;
      }

      .timer-circle-progress {
        fill: none;
        stroke: var(--primary-color, #3b82f6);
        stroke-width: 8;
        stroke-linecap: round;
        /* r=160, 2*pi*r = 1005.3 */
        stroke-dasharray: 1005.3;
        stroke-dashoffset: 0;
        transition:
          stroke-dashoffset 1s linear,
          stroke 0.5s ease;
        filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.6));
      }

      .timer-circle-progress.break-mode {
        stroke: #10b981; /* Emerald green for breaks */
        filter: drop-shadow(0 0 12px rgba(16, 185, 129, 0.6));
      }

      .timer-display {
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 10;
      }

      .timer-time {
        font-size: 5.5rem;
        font-weight: 800;
        font-family: var(--font-mono, monospace);
        color: white;
        line-height: 1;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        letter-spacing: -2px;
        transition: font-size 0.3s ease;
      }

      .timer-time.long-format {
        font-size: 3.8rem;
      }

      .timer-label {
        margin-top: 0.5rem;
        font-size: 1rem;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-weight: 600;
      }

      /* Custom Premium Select */
      .custom-select-container {
        position: relative;
        width: 100%;
        margin-top: 0.5rem;
      }

      .select-trigger {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        color: white;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.3s ease;
        backdrop-filter: blur(4px);
        font-size: 0.95rem;
      }

      .select-trigger:hover {
        background: rgba(15, 23, 42, 0.8);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .select-trigger svg {
        transition: transform 0.3s ease;
        color: #64748b;
      }

      .custom-select-container.active .select-trigger svg {
        transform: rotate(180deg);
      }

      .select-options {
        position: absolute;
        top: calc(100% + 0.5rem);
        left: 0;
        right: 0;
        background: #1e293b;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0.75rem;
        z-index: 1000;
        display: none;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(12px);
      }

      .custom-select-container.active .select-options {
        display: block;
        animation: fadeIn 0.2s ease-out;
      }

      .select-option {
        padding: 0.75rem 1rem;
        cursor: pointer;
        transition: all 0.2s;
        color: #e2e8f0;
        font-size: 0.9rem;
      }

      .select-option:hover {
        background: var(--primary-color);
        color: white;
      }

      .select-option.selected {
        background: rgba(59, 130, 246, 0.1);
        color: var(--primary-color);
      }

      .native-select {
        display: none;
      }

      .blur-sidebar {
        gap: 1.25rem !important;
      }

      .btn-play-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-right: 0.5rem;
      }

      .custom-inputs-wrapper {
        display: none;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }

      .custom-inputs-wrapper.active {
        display: flex;
        animation: fadeIn 0.3s ease-out;
      }

      .custom-input-group {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .custom-input-group label {
        font-size: 0.7rem;
        color: #94a3b8;
        text-transform: uppercase;
        font-weight: 600;
        margin: 0;
      }

      .custom-input-group input {
        width: 100%;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 0.5rem;
        border-radius: 0.5rem;
        color: white;
        font-family: var(--font-mono, monospace);
        font-size: 0.9rem;
        text-align: center;
        outline: none;
        transition: border-color 0.3s;
      }

      .custom-input-group input:focus {
        border-color: var(--primary-color);
      }

      .btn-apply-custom {
        margin-top: 0.75rem;
        display: none !important;
      }

      .btn-apply-custom.active {
        display: block !important;
        animation: fadeIn 0.3s ease-out;
      }

      .fullscreen-btn {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #94a3b8;
        border-radius: 0.5rem;
        width: 36px;
        height: 36px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: all 0.2s;
        z-index: 20;
      }

      .fullscreen-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }

      .blur-main {
        position: relative;
      }

      #timer-main-area:fullscreen {
        background: #020617;
        border: none;
        border-radius: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #timer-main-area:fullscreen .timer-layout {
        height: 100vh;
        margin: 0;
      }

      #timer-main-area:fullscreen .timer-container {
        transform: scale(1.6);
      }

      #timer-main-area:-webkit-full-screen {
        background: #020617;
        border: none;
        border-radius: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #timer-main-area:-webkit-full-screen .timer-layout {
        height: 100vh;
        margin: 0;
      }

      #timer-main-area:-webkit-full-screen .timer-container {
        transform: scale(1.6);
      }

      @media (max-width: 1024px) {
        .timer-layout {
          height: auto;
          padding: 2rem 0;
        }
      }
    </style>
  </head>

  <body>
    <load src="../../ui/navbar.html" />

    <h1>Pomodoro Timer</h1>

    <div class="blur-tool-layout">
      <div class="blur-sidebar">
        <div class="sidebar-section">
          <h3>1. Timer Mode</h3>
          <label>Select Duration</label>
          <div class="custom-select-container" data-id="timer-mode">
            <div class="select-trigger">
              <span id="mode-label">Pomodoro (25:00)</span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="m6 9 6 6 6-6" />
              </svg>
            </div>
            <div class="select-options">
              <div class="select-option selected" data-value="25">
                Pomodoro (25:00)
              </div>
              <div class="select-option" data-value="5">Short Break (5:00)</div>
              <div class="select-option" data-value="15">
                Long Break (15:00)
              </div>
              <div class="select-option" data-value="custom">Custom...</div>
            </div>
            <select id="timer-mode" class="native-select">
              <option value="25" selected>Pomodoro (25:00)</option>
              <option value="5">Short Break (5:00)</option>
              <option value="15">Long Break (15:00)</option>
              <option value="custom">Custom...</option>
            </select>
          </div>

          <div class="custom-inputs-wrapper" id="custom-inputs">
            <div class="custom-input-group">
              <label>HRS</label>
              <input type="number" id="custom-h" min="0" max="99" value="0" />
            </div>
            <div class="custom-input-group">
              <label>MIN</label>
              <input type="number" id="custom-m" min="0" max="59" value="25" />
            </div>
            <div class="custom-input-group">
              <label>SEC</label>
              <input type="number" id="custom-s" min="0" max="59" value="0" />
            </div>
          </div>
          <button
            class="btn btn-primary w-full btn-apply-custom"
            id="apply-custom-btn"
          >
            Apply Custom Time
          </button>
        </div>

        <div class="sidebar-section">
          <h3>2. Alarm Options</h3>
          <div style="margin-bottom: 0.75rem">
            <label
              style="
                display: block;
                font-size: 0.85rem;
                color: #cbd5e1;
                margin-bottom: 0.25rem;
              "
              >Alarm Sound</label
            >
            <div class="custom-select-container" data-id="alarm-sound-select">
              <div class="select-trigger">
                <span id="sound-label">Classic Digital</span>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="m6 9 6 6 6-6" />
                </svg>
              </div>
              <div class="select-options">
                <div class="select-option selected" data-value="digital">
                  Classic Digital
                </div>
                <div class="select-option" data-value="beep">Retro Beep</div>
                <div class="select-option" data-value="chime">Gentle Chime</div>
              </div>
              <select id="alarm-sound-select" class="native-select">
                <option value="digital" selected>Classic Digital</option>
                <option value="beep">Retro Beep</option>
                <option value="chime">Gentle Chime</option>
              </select>
            </div>
          </div>
          <div>
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 0.25rem;
              "
            >
              <label style="font-size: 0.85rem; color: #cbd5e1">Volume</label>
              <span id="volume-val" class="val-badge">80%</span>
            </div>
            <input
              type="range"
              id="alarm-volume"
              min="0"
              max="100"
              value="80"
              style="margin-top: 0.25rem"
            />
          </div>
          <div
            style="
              margin-top: 0.75rem;
              display: flex;
              align-items: center;
              justify-content: space-between;
            "
          >
            <label
              style="font-size: 0.85rem; color: #cbd5e1; cursor: pointer"
              for="ticking-sound-toggle"
              >Play Ticking Sound</label
            >
            <input
              type="checkbox"
              id="ticking-sound-toggle"
              style="
                width: 18px;
                height: 18px;
                cursor: pointer;
                accent-color: var(--primary-color);
              "
            />
          </div>
        </div>

        <div class="sidebar-section">
          <h3>3. Controls</h3>
          <button class="btn btn-primary w-full" id="start-btn">
            <span class="btn-play-icon" id="start-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="currentColor"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
              </svg>
            </span>
            <span id="start-text">Start Timer</span>
          </button>

          <button
            class="btn btn-secondary w-full"
            id="reset-btn"
            style="margin-top: 0.75rem"
          >
            <span class="btn-play-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"
                ></path>
                <path d="M3 3v5h5"></path>
              </svg>
            </span>
            <span>Reset Timer</span>
          </button>
        </div>

        <div class="sidebar-section" id="stats-section">
          <h3>4. Focus Stats</h3>
          <div
            style="
              display: flex;
              justify-content: space-between;
              margin-bottom: 0.5rem;
              font-size: 0.9rem;
            "
          >
            <span>Completed Sessions:</span>
            <span
              id="sessions-count"
              style="font-weight: 700; color: var(--primary-color)"
              >0</span
            >
          </div>
          <div
            style="
              display: flex;
              justify-content: space-between;
              font-size: 0.9rem;
              margin-bottom: 0.75rem;
            "
          >
            <span>Total Focus Time:</span>
            <span
              id="total-focus-time"
              style="font-weight: 700; color: var(--secondary-color)"
              >0m</span
            >
          </div>
          <button
            class="btn btn-secondary w-full"
            id="clear-stats-btn"
            style="padding: 0.5rem; font-size: 0.8rem"
          >
            Reset Stats
          </button>
        </div>
      </div>

      <div class="blur-main" id="timer-main-area">
        <button
          class="fullscreen-btn"
          id="fullscreen-btn"
          title="Toggle Fullscreen"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
            ></path>
          </svg>
        </button>
        <div class="timer-layout">
          <div class="timer-container">
            <svg class="timer-svg" viewBox="0 0 340 340">
              <circle
                class="timer-circle-bg"
                cx="170"
                cy="170"
                r="160"
              ></circle>
              <circle
                class="timer-circle-progress"
                id="timer-progress"
                cx="170"
                cy="170"
                r="160"
              ></circle>
            </svg>
            <div class="timer-display">
              <div class="timer-time" id="time-display">25:00</div>
              <div class="timer-label" id="time-label">Focus</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <load src="../../ui/footer.html" />

    <script type="module" src="./timer.js"></script>
    <script type="module" src="/ui/navbar.js"></script>
  </body>
</html>
